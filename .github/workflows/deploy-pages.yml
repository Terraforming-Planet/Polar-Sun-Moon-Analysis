name: Build and deploy Terra Observation

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - name: Refresh lightweight public observations
        run: |
          python -m terra_hazards sources --output web/public/data/sources.json
          python -m terra_hazards update --output web/public/data/hazards.json --limit 200
          python -m polar_equinox_analysis solar-system --output web/public/data/solar-system.json
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
      - name: Add Copernicus result pages to the deployment
        run: |
          mkdir -p web/dist/flood-map web/dist/reports web/dist/charts/copernicus web/dist/data/copernicus
          cp -R docs/flood-map/. web/dist/flood-map/
          cp -R docs/reports/. web/dist/reports/
          cp -R docs/charts/copernicus/. web/dist/charts/copernicus/
          cp -R docs/data/copernicus/. web/dist/data/copernicus/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
