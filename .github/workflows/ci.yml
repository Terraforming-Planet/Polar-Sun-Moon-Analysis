name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-cdse.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-cdse.txt
          python -m pip check
          python -c "import jinja2, matplotlib, requests, yaml; print('CDSE imports OK')"
          python -c "import importlib.metadata as m; print('types-PyYAML', m.version('types-PyYAML'))"

      - name: Ruff lint
        run: python -m ruff check .

      - name: Mypy type check
        run: |
          python -m mypy \
            polar_equinox_analysis \
            terra_hazards \
            scripts/cdse \
            tests

      - name: Pytest
        run: python -m pytest -q

      - name: Compile Python modules
        run: |
          python -m compileall \
            polar_equinox_analysis \
            terra_hazards \
            scripts/cdse \
            tests

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Test and build web application
        working-directory: web
        run: |
          npm ci
          npm test
          npm run build
