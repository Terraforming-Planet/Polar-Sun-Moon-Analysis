name: NASA Horizons live smoke test

on:
  schedule:
    - cron: "41 5 * * 1"
  workflow_dispatch:

jobs:
  horizons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt
      - name: Verify real declination and polar elevation fields
        run: |
          python - <<'PY'
          from datetime import UTC, datetime
          from tempfile import TemporaryDirectory
          from polar_equinox_analysis.horizons import HorizonsClient
          from polar_equinox_analysis.models import Observatory

          with TemporaryDirectory() as cache:
              client = HorizonsClient(cache, retries=2)
              instant = datetime(2024, 3, 20, 3, 6, tzinfo=UTC)
              declination = client.sun_declination(instant)
              observation = client.observer_ephemeris(
                  "Moon", Observatory("North Pole", 90.0), instant
              )
              assert -90 <= declination <= 90
              assert -90 <= observation["declination_deg"] <= 90
              assert -90 <= observation["apparent_altitude_deg"] <= 90
              print(declination, observation)
          PY
